[General]
; Master enable/disable for the entire plugin
bEnable=true

[Filtering]
; Set to true to disable mouse movement-based 3D model rotation during loading screens
bDisableMouseMove=true
; Set to true to disable both thumbstick-based 3D model manipulation during loading screens
bDisableThumbsticks=true

[UserEventGate]
; When true, only filters input events with user event names in the allowlist.
; This improves compatibility with loading screen overhaul mods that may use
; input axes for custom UI interactions.
; When false, all mouse movement and thumbstick inputs are zeroed during loading.
bUserEventGate=true

; Comma-separated list of user event names to filter (case-insensitive).
; Common values: rotate, look
; Only applies when bUserEventGate=true
sUserEventAllowlist=rotate,look

[Debug]
; Set to true to enable debug logging of filtering state changes
; Log file: Documents/My Games/Skyrim Special Edition/SKSE/LoadingScreenLocker.log
bDebugLogging=false
